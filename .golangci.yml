version: "2"
linters:
  enable:
    - bodyclose
    - errorlint
    - misspell
    - revive
    - unconvert
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
      # scope.ScopePredicate is the authoritative public API name (DESIGN §7,
      # ADR-0009): the compiled TaskContract that callers pass to closure.Safe.
      # revive's exported-stutter heuristic flags scope.ScopePredicate, but
      # "predicate" is the domain noun and renaming to scope.Predicate would
      # diverge from the design and the ADR. Narrowly silence that one rule for
      # this identifier rather than weakening revive elsewhere.
      - linters:
          - revive
        path: scope/scope\.go
        text: ScopePredicate
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
