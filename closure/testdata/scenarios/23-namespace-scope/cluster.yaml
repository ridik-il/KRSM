# A single workload tree wholly contained in the `prod` namespace: a Deployment
# owns a ReplicaSet which owns two Pods, and the Deployment selects those pods
# (app=web). There is no Service/PDB/NetworkPolicy and no cross-namespace owner, so
# a cascade delete's closure is exactly {Deployment, ReplicaSet, web-1, web-2} — all
# in `prod`. That is the point: a `dim: namespace` clause for `prod` authorises
# "every resource in prod", so the whole closure is in scope with no per-resource
# names or selector to enumerate.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: prod
  labels: {app: web}
spec:
  selector:
    matchLabels: {app: web}
---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: web-rs
  namespace: prod
  labels: {app: web}
  ownerReferences:
    - {kind: Deployment, name: web}
spec:
  selector:
    matchLabels: {app: web}
---
apiVersion: v1
kind: Pod
metadata:
  name: web-1
  namespace: prod
  labels: {app: web}
  ownerReferences:
    - {kind: ReplicaSet, name: web-rs}
---
apiVersion: v1
kind: Pod
metadata:
  name: web-2
  namespace: prod
  labels: {app: web}
  ownerReferences:
    - {kind: ReplicaSet, name: web-rs}
