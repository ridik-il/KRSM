# Task: restart the `frontend` Deployment. The restart is classified Disruptive, so
# KRSM's engine over-approximates its blast radius as EVERY `app=web` Pod in the
# namespace — ownership-independent (PodsSelectedBy/PodsMatching matches by label,
# not ownerReference; DESIGN §4 disruptive relation, §11 fidelity). Here that is
# `frontend-aaa` (the workload's own pod) AND `worker-bbb`. `db-ccc` (app=db) is the
# decoy — not selected.
#
# This scenario proves the TaskContract→ScopePredicate compiler path: the cluster
# and request mirror scenario 20 (selector-precision), but scope is NOT supplied by
# a hand-written scope.yaml. Instead a taskcontract.yaml (DESIGN §6 wire form) is
# parsed by the loader, compiled by scope.Compile into the same dimension-typed
# closure.ScopeClause set, and handed to closure.Safe. Scenario 20 keeps golden
# coverage of the scope.yaml path; this scenario adds the compiler proof additively.
#
# MODEL-FIDELITY CAVEAT (read before the comments below mislead you): a real
# `kubectl rollout restart Deployment/frontend` cycles ONLY frontend's own pods, so
# in a real cluster `worker-bbb` would NOT be disrupted. `worker-bbb` is in the
# closure here purely because the engine models a disruptive workload verb as
# affecting all pods matching the workload's selector in the namespace — a
# deliberate, sound CONSERVATIVE over-approximation, not literal restart semantics.
# The two-workloads-sharing-`app=web` setup is a CONTRIVED overlapping-selector
# premise engineered to yield a cross-name-stem pod set; it is the construction, not
# a claim about how restart behaves. The selector-scope compiler under test is
# correct regardless of this modelling choice — it is about whether a TaskContract
# can express "the app=web pods" precisely and compile it to a ScopePredicate.
#
# No Service/PDB/NetworkPolicy: keeps the closure to the Deployment + its selected
# pods, so the proof is about the compiled scope precision and nothing else.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: prod
  labels: {app: web}
spec:
  selector:
    matchLabels: {app: web}
---
apiVersion: v1
kind: Pod
metadata:
  name: frontend-aaa
  namespace: prod
  labels: {app: web}
---
apiVersion: v1
kind: Pod
metadata:
  name: worker-bbb
  namespace: prod
  labels: {app: web}
---
apiVersion: v1
kind: Pod
metadata:
  name: db-ccc
  namespace: prod
  labels: {app: db}
