# A NetworkPolicy scoped to API Pods, plus one API Pod and one unrelated web Pod.
# The agent widens spec.podSelector to {} (namespace-wide) instead of app=api.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-allow
  namespace: prod
spec:
  podSelector:
    matchLabels: {app: api}
---
apiVersion: v1
kind: Pod
metadata:
  name: api-1
  namespace: prod
  labels: {app: api}
---
apiVersion: v1
kind: Pod
metadata:
  name: web-1
  namespace: prod
  labels: {app: web}
