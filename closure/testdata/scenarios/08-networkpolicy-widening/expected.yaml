# Proves the fix for findings #2 and #3: the empty selector binds every Pod in
# the namespace (kind-aware semantics), computed via State.PodsMatching (no
# concrete-type dependency). The non-API web-1 Pod is pulled under the policy and
# escapes scope.
verdict: Block
closure:
  - {kind: NetworkPolicy, namespace: prod, name: api-allow}
  - {kind: Pod, namespace: prod, name: api-1}
  - {kind: Pod, namespace: prod, name: web-1}
escaping:
  # The NetworkPolicy target and api-1 are in scope; only the non-API web-1
  # escapes.
  - {kind: Pod, namespace: prod, name: web-1}
external: []
