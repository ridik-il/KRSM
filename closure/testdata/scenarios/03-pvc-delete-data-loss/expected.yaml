# Proves the fix for finding #1: deleting a mountable follows its consumers.
# The closure reaches the still-running analytics Pod, which escapes the task
# scope of "delete batch-x".
verdict: Block
closure:
  - {kind: PersistentVolumeClaim, namespace: prod, name: batch-data}
  - {kind: Pod, namespace: prod, name: batch-x}
  - {kind: Pod, namespace: prod, name: analytics}
escaping:
  # The wrong-target PVC itself is out of scope (the task only authorised deleting
  # batch-x) — now caught directly via target inclusion (finding M1), in addition
  # to the live analytics consumer.
  - {kind: PersistentVolumeClaim, namespace: prod, name: batch-data}
  - {kind: Pod, namespace: prod, name: analytics}
external: []
