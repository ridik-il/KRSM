# A single workload ownership tree in `prod`: a Deployment owns a ReplicaSet which
# owns two Pods. There is no Service/PDB/NetworkPolicy and no cross-namespace owner,
# so a cascade delete's closure is exactly {Deployment, ReplicaSet, web-1, web-2} —
# the Deployment's transitive owned subtree. That is the point: a `dim: ownership`
# clause rooted at the Deployment authorises "the Deployment and everything it owns",
# so the whole closure is in scope without enumerating names, namespaces or labels.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: prod
  labels: {app: web}
spec:
  selector:
    matchLabels: {app: web}
---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: web-rs
  namespace: prod
  labels: {app: web}
  ownerReferences:
    - {kind: Deployment, name: web}
spec:
  selector:
    matchLabels: {app: web}
---
apiVersion: v1
kind: Pod
metadata:
  name: web-1
  namespace: prod
  labels: {app: web}
  ownerReferences:
    - {kind: ReplicaSet, name: web-rs}
---
apiVersion: v1
kind: Pod
metadata:
  name: web-2
  namespace: prod
  labels: {app: web}
  ownerReferences:
    - {kind: ReplicaSet, name: web-rs}
