version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      go-deps:
        patterns: ["*"]

  # Keeps the SHA-pinned actions current (rewrites the pin + version comment), so
  # pinning to immutable commits does not mean running stale action code.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["*"]
