name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod   # build + test on the project's stated minimum Go
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt -s:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (race + coverage)
        run: go test -race -count=1 -coverprofile=coverage.txt -covermode=atomic ./...

      - name: coverage summary
        run: |
          pct=$(go tool cover -func=coverage.txt | tail -1 | awk '{print $3}')
          echo "Total coverage: $pct" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.txt
          if-no-files-found: error

  # staticcheck runs in its own job on the latest Go: its installer needs current Go
  # (staticcheck@latest requires Go >= 1.25), while the analysis still respects the
  # project's go.mod. Keeping it separate also means a lint finding never masks the
  # build/test result.
  staticcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: true
      - name: staticcheck
        uses: dominikh/staticcheck-action@9716614d4101e79b4340dd97b10e54d68234e431 # v1.4.1
        with:
          version: latest
          install-go: false   # reuse the stable Go setup-go just installed

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod   # golangci-lint analyzes against this Go line
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          # golangci-lint v2 (action v9 only drives v2); .golangci.yml is v2-schema.
          version: v2.12.2

  govulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable   # govulncheck needs current Go to install
          cache: true
      - name: govulncheck
        run: |
          # Pinned (not @latest) so the analysis tool version is reproducible and
          # Scorecard's Pinned-Dependencies check passes. Dependabot does not track
          # `go install` args, so bump this by hand when a new govulncheck ships.
          go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
          govulncheck ./...

  # PR-only: diffs the PR's dependency changes against advisories + license policy.
  # NOTE: on a PRIVATE repo this requires GitHub Advanced Security; it works for free
  # once the repository is public (see ADR-0006 / the release-and-ci notes).
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          # KRSM is Apache-2.0; deny copyleft that would conflict with embedding in
          # commercial agents.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
