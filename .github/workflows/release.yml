# Tag-triggered release. Separate from ci.yml (which owns PR-time gating).
# Cut a release by finalizing the CHANGELOG section, then: git tag vX.Y.Z && git push --tags
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create the GitHub Release + upload assets
      id-token: write    # cosign keyless OIDC (Fulcio/Rekor)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0          # goreleaser needs full history + tags

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # syft (SBOM) and cosign (signing). Pin the cosign BINARY (cosign-release),
      # not just the installer action SHA: cosign v3.x defaults to the new bundle
      # format, which deprecates the --output-signature/--output-certificate flags
      # .goreleaser.yaml passes and fails signing ("create bundle file: open : no
      # such file or directory"). Pin the latest 2.x, which keeps the legacy
      # .sig/.pem output goreleaser expects. Revisit when migrating to --bundle.
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.6.3'

      # Extract THIS tag's section from CHANGELOG.md to a file OUTSIDE the repo
      # (a tracked/untracked change would make goreleaser refuse the dirty tree).
      # Grabs lines between "## [X.Y.Z]" and the next "## [" header.
      - name: Extract release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          cat "$RUNNER_TEMP/release-notes.md"

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean --release-notes=${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # goreleaser v2 suppresses the --release-notes body when changelog.disable is
      # set, so the release publishes empty. Set the body explicitly from the
      # CHANGELOG section already extracted above — deterministic, decoupled from
      # goreleaser's changelog handling.
      - name: Set release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --notes-file "$RUNNER_TEMP/release-notes.md"
