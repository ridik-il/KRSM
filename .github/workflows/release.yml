# Tag-triggered release. Separate from ci.yml (which owns PR-time gating).
# Cut a release by finalizing the CHANGELOG section, then: git tag vX.Y.Z && git push --tags
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create the GitHub Release + upload assets
      id-token: write    # cosign keyless OIDC (Fulcio/Rekor)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0          # goreleaser needs full history + tags

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # syft (SBOM) and cosign (signing), both pinned.
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Extract THIS tag's section from CHANGELOG.md into $RELEASE_NOTES.
      # Grabs lines between "## [X.Y.Z]" and the next "## [" header.
      - name: Extract release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo 'RELEASE_NOTES<<EOF'
            awk -v v="$version" '
              $0 ~ "^## \\[" v "\\]" { grab = 1; next }
              grab && /^## \[/ { exit }
              grab { print }
            ' CHANGELOG.md
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # RELEASE_NOTES inherited from $GITHUB_ENV
